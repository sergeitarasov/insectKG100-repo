name: Convert Submissions

on:
  push:
    branches: [main]
    paths:
      - 'submissions/extracted/**'
  workflow_dispatch:
    inputs:
      rebuild_all:
        description: 'Rebuild ALL submissions (not just changed ones)'
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Prevent concurrent runs from clobbering each other's git push
concurrency:
  group: convert-submissions
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Detect which submission folders changed
  # ---------------------------------------------------------------------------
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false

      - name: Detect changed (or all) submission IDs
        id: detect
        run: |
          if [[ "${{ inputs.rebuild_all }}" == "true" ]]; then
            CANDIDATES=$(ls submissions/extracted/)
          elif [[ -z "${{ github.event.before }}" || "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
            CANDIDATES=$(ls submissions/extracted/)
          else
            CANDIDATES=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" \
              | grep '^submissions/extracted/' \
              | cut -d/ -f3 \
              | sort -u)
          fi

          # Only include submissions that are complete:
          #   - phs-config.yaml must exist
          #   - at least one .yphs file must exist
          # Incomplete submissions (still being uploaded) are skipped silently;
          # the final file push will trigger the workflow again and pass this check.
          READY=""
          for ID in $CANDIDATES; do
            DIR="submissions/extracted/$ID"
            if [[ ! -f "$DIR/phs-config.yaml" ]]; then
              echo "SKIP $ID — missing phs-config.yaml"
              continue
            fi
            YPHS_COUNT=$(find "$DIR" -maxdepth 1 -name "*.yphs" | wc -l)
            if [[ "$YPHS_COUNT" -eq 0 ]]; then
              echo "SKIP $ID — no .yphs files yet"
              continue
            fi
            echo "READY $ID ($YPHS_COUNT .yphs file(s))"
            READY="$READY $ID"
          done

          IDS=$(echo "$READY" | tr ' ' '\n' | grep -v '^$' | jq -R . | jq -sc .)
          echo "Matrix: $IDS"
          echo "matrix=$IDS" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Job 2: Convert .yphs → OWL + HTML + SHACL, then materialize per submission
  # ---------------------------------------------------------------------------
  convert:
    needs: detect
    if: needs.detect.outputs.matrix != '[]' && needs.detect.outputs.matrix != ''
    runs-on: ubuntu-latest
    strategy:
      matrix:
        submission: ${{ fromJson(needs.detect.outputs.matrix) }}
      fail-fast: false   # process remaining submissions even if one fails
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - name: Pull CI Docker image
        run: docker pull sergeit215/insectkg100-repo:latest

      # -----------------------------------------------------------------------
      # Convert each .yphs in the submission — outputs go to shared dirs:
      #   outputs/<id>/owl_init/   <- .owl + .xml
      #   outputs/<id>/nl/         <- .html
      #   outputs/<id>/log-shacl/  <- .shacl.txt
      # -----------------------------------------------------------------------
      - name: Convert .yphs files
        run: |
          ID="${{ matrix.submission }}"
          mkdir -p "outputs/$ID/owl_init" "outputs/$ID/nl" "outputs/$ID/log-shacl"
          YPHS_COUNT=0

          for yphs in "submissions/extracted/$ID/"*.yphs; do
            [[ -f "$yphs" ]] || { echo "No .yphs files found in $ID"; break; }
            BASE=$(basename "$yphs" .yphs)
            echo "--- Converting: $BASE ---"

            docker run --rm \
              --platform linux/amd64 \
              -v "$GITHUB_WORKSPACE/submissions/extracted/$ID":/app/input:ro \
              -v "$GITHUB_WORKSPACE/ci/snippets":/app/snippets:ro \
              -v "$GITHUB_WORKSPACE/ci/utils":/app/utils:ro \
              -v "$GITHUB_WORKSPACE/outputs/$ID/owl_init":/app/output \
              -v "$GITHUB_WORKSPACE/outputs/$ID/nl":/app/nl_output \
              -v "$GITHUB_WORKSPACE/outputs/$ID/log-shacl":/app/log-shacl \
              -e PHS_FILE="${BASE}.yphs" \
              -e NL_FORMAT=html \
              -e GBIF_FLAG=0 \
              sergeit215/insectkg100-repo:latest

            YPHS_COUNT=$((YPHS_COUNT + 1))
          done

          echo "Converted $YPHS_COUNT file(s) for $ID"

      # -----------------------------------------------------------------------
      # Emit GHA warning annotations for any SHACL failures
      # -----------------------------------------------------------------------
      - name: Check SHACL results
        run: |
          ID="${{ matrix.submission }}"
          ALL_PASS=true
          for log in "outputs/$ID/log-shacl/"*.shacl.txt; do
            [[ -f "$log" ]] || continue
            if ! grep -q "^Conforms$" "$log"; then
              echo "::warning file=$log::SHACL non-conformance: $(basename "$log" .shacl.txt)"
              ALL_PASS=false
            fi
          done
          $ALL_PASS && echo "All SHACL checks passed for $ID"

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: outputs-${{ matrix.submission }}
          path: outputs/${{ matrix.submission }}/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 3: Collect ALL submission OWLs -> merge -> materialize -> final KB
  #   abox/abox-merged.owl
  #   abox/abox-whelk-raw.ttl
  #   abox/abox-whelk-annotated.ttl
  #   kb/insectKG100-kb.ttl
  # ---------------------------------------------------------------------------
  finalize:
    needs: convert
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Download all submission outputs
        uses: actions/download-artifact@v4
        with:
          pattern: outputs-*
          path: outputs/
          merge-multiple: false

      - name: Flatten artifact directories
        run: |
          cd outputs
          for dir in outputs-*/; do
            id="${dir#outputs-}"
            id="${id%/}"
            mv "$dir" "$id"
          done
          echo "=== Output tree ==="
          find . -type f | sort

      - name: Pull CI Docker image
        run: docker pull sergeit215/insectkg100-repo:latest

      - name: Materialize -- merge all OWLs -> reason -> annotate -> final KB
        run: |
          mkdir -p "$GITHUB_WORKSPACE/abox" "$GITHUB_WORKSPACE/kb" "$GITHUB_WORKSPACE/log-materializer"

          echo "=== Host outputs tree ==="
          find "$GITHUB_WORKSPACE/outputs" -type f | sort || echo "(outputs dir empty or missing)"

          OWL_COUNT=$(find "$GITHUB_WORKSPACE/outputs" -path "*/owl_init/*.owl" | wc -l)
          echo "Found $OWL_COUNT OWL file(s) across all submissions"

          if [[ "$OWL_COUNT" -eq 0 ]]; then
            echo "No OWL files found -- skipping materialization"
            exit 0
          fi

          docker run --rm \
            --platform linux/amd64 \
            --entrypoint bash \
            -v "$GITHUB_WORKSPACE/outputs":/app/outputs:ro \
            -v "$GITHUB_WORKSPACE/source_ontologies":/app/source_ontologies:ro \
            -v "$GITHUB_WORKSPACE/ci/utils":/app/utils:ro \
            -v "$GITHUB_WORKSPACE/abox":/app/abox \
            -v "$GITHUB_WORKSPACE/kb":/app/kb \
            -v "$GITHUB_WORKSPACE/log-materializer":/app/log-materializer \
            -v "$GITHUB_WORKSPACE/ci/scripts/materialize.sh":/app/run.sh:ro \
            sergeit215/insectkg100-repo:latest \
            /app/run.sh

      - name: Check materializer log
        run: |
          if [[ -f log-materializer/materializer.log ]] && grep -q "Inconsistent dataset" log-materializer/materializer.log; then
            echo "::warning::Inconsistent dataset detected -- see log-materializer/materializer.log"
          fi

      - name: Commit and push outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add outputs/ abox/ kb/ log-materializer/

          if git diff --cached --quiet; then
            echo "Nothing to commit -- outputs unchanged"
          else
            git commit -m "ci: process submissions [skip ci]"
            git pull --rebase origin main
            git push
          fi
